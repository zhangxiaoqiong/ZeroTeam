<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI团队事务清单 - 团队看板</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card-bg: #ffffff;
      --text: #333;
      --text-secondary: #666;
      --border: #e1e4e8;
      --primary: #4a90d9;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .dark {
      --bg: #1a1a2e;
      --card-bg: #16213e;
      --text: #eee;
      --text-secondary: #aaa;
      --border: #2a2a4a;
      --shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 { font-size: 1.8rem; }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .api-status {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 12px;
    }

    .api-status.connected { background: #d4edda; color: #155724; }
    .api-status.disconnected { background: #f8d7da; color: #721c24; }

    .theme-toggle {
      background: none;
      border: 2px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
    }

    /* Stats Summary */
    .stats-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      margin-top: 12px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--success));
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Dashboard Grid */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      font-size: 1rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Agent Cards */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .agent-card {
      background: var(--bg);
      border-radius: 10px;
      padding: 16px;
      border-left: 4px solid var(--primary);
    }

    .agent-card.idle { border-left-color: #6c757d; }
    .agent-card.working { border-left-color: var(--warning); }
    .agent-card.completed { border-left-color: var(--success); }
    .agent-card.error { border-left-color: var(--danger); }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .agent-name {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .agent-status {
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 10px;
    }

    .agent-status.idle { background: #e2e3e5; color: #383d41; }
    .agent-status.working { background: #fff3cd; color: #856404; }
    .agent-status.completed { background: #d4edda; color: #155724; }
    .agent-status.error { background: #f8d7da; color: #721c24; }

    .agent-task {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    .agent-task strong { color: var(--text); }

    .agent-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Task List */
    .task-item {
      background: var(--bg);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .task-item.in_progress {
      border-left: 3px solid var(--warning);
    }

    .task-item.pending {
      border-left: 3px solid var(--primary);
    }

    .task-priority {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .task-priority.high { background: var(--danger); }
    .task-priority.medium { background: var(--warning); }
    .task-priority.low { background: var(--success); }

    .task-info { flex: 1; }

    .task-title {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .task-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .task-agent {
      font-size: 0.75rem;
      background: #e5f3ff;
      color: #0066cc;
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* Activity Log */
    .activity-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .activity-item {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-time {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .activity-message {
      margin-top: 4px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-item {
      text-align: center;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--primary);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn:hover { opacity: 0.9; }

    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 0.9rem; }
    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .empty { text-align: center; color: var(--text-secondary); padding: 40px; }

    /* Auto refresh indicator */
    .refresh-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--card-bg);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.75rem;
      box-shadow: var(--shadow);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 AI团队事务清单 <small style="font-size:0.6em;color:var(--text-secondary)">- 团队看板</small></h1>
      <div class="header-right">
        <span class="api-status" id="apiStatus">连接中...</span>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
      </div>
    </header>

    <!-- Stats Row -->
    <div class="card" style="margin-bottom: 20px;">
      <h2>📊 团队概览</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="totalTasks">0</div>
          <div class="stat-label">总任务</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="pendingTasks">0</div>
          <div class="stat-label">待处理</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="workingAgents">0</div>
          <div class="stat-label">工作中</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="completedTasks">0</div>
          <div class="stat-label">已完成</div>
        </div>
      </div>
      <div style="margin-top:16px">
        <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:4px">
          <span>完成进度</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
    </div>
      </div>
    </div>

    <div class="dashboard">
      <!-- Agent Status -->
      <div class="card">
        <h2>🤖 Agent 状态 <span class="pulse" style="font-size:0.7rem">● 实时</span></h2>
        <div class="agent-grid" id="agentGrid">
          <div class="empty">暂无 Agent</div>
        </div>
      </div>

      <!-- Active Tasks -->
      <div class="card">
        <h2>📋 进行中任务</h2>
        <div id="taskList">
          <div class="empty">暂无任务</div>
        </div>
      </div>

      <!-- Activity Log -->
      <div class="card">
        <h2>📝 团队动态</h2>
        <div class="activity-list" id="activityList">
          <div class="empty">暂无动态</div>
        </div>
      </div>
    </div>

    <!-- Add Task Form -->
    <div class="card">
      <h2>➕ 添加新任务</h2>
      <div class="form-group">
        <input type="text" id="todoTitle" placeholder="任务标题...">
      </div>
      <div class="form-group">
        <textarea id="todoDesc" placeholder="任务描述（可选）" style="min-height:60px"></textarea>
      </div>
      <div class="row">
        <div class="form-group">
          <select id="todoPriority">
            <option value="low">低优先级</option>
            <option value="medium" selected>中优先级</option>
            <option value="high">高优先级</option>
          </select>
        </div>
        <div class="form-group">
          <input type="text" id="todoCategory" placeholder="分类（可选）">
        </div>
      </div>
      <button class="btn btn-primary" onclick="addTodo()" style="width:100%">添加任务</button>
    </div>
  </div>

  <div class="refresh-indicator">
    🔄 每5秒自动刷新
  </div>

  <script>
    const API_BASE = 'http://localhost:3001/api';
    let apiConnected = false;

    // 检查 API 状态
    async function checkApiStatus() {
      try {
        const res = await fetch(`${API_BASE}/stats`);
        if (res.ok) {
          apiConnected = true;
          document.getElementById('apiStatus').textContent = '🟢 已连接';
          document.getElementById('apiStatus').className = 'api-status connected';
          return true;
        }
      } catch (e) {
        apiConnected = false;
        document.getElementById('apiStatus').textContent = '🔴 未连接';
        document.getElementById('apiStatus').className = 'api-status disconnected';
      }
      return false;
    }

    // 加载团队数据
    async function loadTeamData() {
      try {
        const res = await fetch(`${API_BASE}/team/activity`);
        const data = await res.json();
        renderDashboard(data);
      } catch (e) {
        console.error('加载失败:', e);
      }
    }

    function renderDashboard(data) {
      // 统计
      const { agents, tasks, recentLogs } = data;
      
      document.getElementById('totalTasks').textContent = tasks.length;
      document.getElementById('pendingTasks').textContent = tasks.filter(t => t.status === 'pending').length;
      document.getElementById('completedTasks').textContent = tasks.filter(t => t.status === 'completed').length;
      document.getElementById('totalAgents').textContent = agents.length;
      document.getElementById('workingAgents').textContent = agents.filter(a => a.status === 'working').length;
      document.getElementById('idleAgents').textContent = agents.filter(a => a.status === 'idle').length;

      // 更新进度条
      const total = tasks.length;
      const completed = tasks.filter(t => t.status === 'completed').length;
      const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
      document.getElementById('progressPercent').textContent = percent + '%';
      document.getElementById('progressFill').style.width = percent + '%';

      // Agent 卡片 - 按 main 优先排序
      agents.sort((a, b) => {
        if (a.name === 'main') return -1;
        if (b.name === 'main') return 1;
        return a.name.localeCompare(b.name);
      });
      
      const agentGrid = document.getElementById('agentGrid');
      if (agents.length === 0) {
        agentGrid.innerHTML = '<div class="empty">暂无 Agent 注册</div>';
      } else {
        agentGrid.innerHTML = agents.map(agent => `
          <div class="agent-card ${agent.status}">
            <div class="agent-header">
              <span class="agent-name">
                ${agent.status === 'working' ? '⚡' : '💤'}
                ${agent.name}
              </span>
              <span class="agent-status ${agent.status}">
                ${agent.status === 'working' ? '工作中' : agent.status === 'idle' ? '空闲' : agent.status === 'completed' ? '完成' : '错误'}
              </span>
            </div>
            ${agent.current_task_title ? `
              <div class="agent-task">
                正在执行: <strong>${escapeHtml(agent.current_task_title)}</strong>
              </div>
            ` : ''}
            <div class="agent-time">
              最后活动: ${formatTime(agent.last_activity)}
            </div>
          </div>
        `).join('');
      }

      // 任务列表
      const taskList = document.getElementById('taskList');
      const activeTasks = tasks.filter(t => t.status === 'pending' || t.status === 'in_progress');
      if (activeTasks.length === 0) {
        taskList.innerHTML = '<div class="empty">暂无进行中的任务</div>';
      } else {
        taskList.innerHTML = activeTasks.map(task => `
          <div class="task-item ${task.status}">
            <div class="task-priority ${task.priority}"></div>
            <div class="task-info">
              <div class="task-title">${escapeHtml(task.title)}</div>
              <div class="task-meta">
                ${task.category ? `📁 ${task.category}` : ''}
                ${task.assignee ? `<span class="task-agent">🤖 ${task.assignee}</span>` : ''}
              </div>
            </div>
          </div>
        `).join('');
      }

      // 活动日志
      const activityList = document.getElementById('activityList');
      if (recentLogs.length === 0) {
        activityList.innerHTML = '<div class="empty">暂无动态</div>';
      } else {
        activityList.innerHTML = recentLogs.slice(0, 15).map(log => `
          <div class="activity-item">
            <div class="activity-time">${formatTime(log.timestamp)}</div>
            <div class="activity-message">
              <strong>${escapeHtml(log.agent_name || 'System')}</strong>: ${escapeHtml(log.message || log.action)}
            </div>
          </div>
        `).join('');
      }
    }

    async function addTodo() {
      const title = document.getElementById('todoTitle').value.trim();
      if (!title) return alert('请输入任务标题');

      const todo = {
        title,
        description: document.getElementById('todoDesc').value.trim(),
        priority: document.getElementById('todoPriority').value,
        category: document.getElementById('todoCategory').value.trim()
      };

      await fetch(`${API_BASE}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(todo)
      });

      document.getElementById('todoTitle').value = '';
      document.getElementById('todoDesc').value = '';
      document.getElementById('todoCategory').value = '';
      
      await loadTeamData();
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(timestamp) {
      if (!timestamp) return '-';
      const date = new Date(timestamp);
      const now = new Date();
      const diff = (now - date) / 1000;
      
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
      return date.toLocaleDateString('zh-CN');
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    // 初始化
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }

    checkApiStatus();
    loadTeamData();

    // 每5秒刷新
    setInterval(loadTeamData, 5000);
  </script>
</body>
</html>
