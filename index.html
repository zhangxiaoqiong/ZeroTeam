<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroTeam - Agent管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f23; color: #eee; min-height: 100vh; }
    .glass { background: rgba(26, 26, 46, 0.95); backdrop-filter: blur(10px); }
  </style>
</head>
<body>
  
  <!-- 顶部导航 -->
  <nav class="glass border-b border-slate-700 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <i class="fas fa-robot text-2xl text-indigo-400"></i>
      <span class="text-xl font-bold">ZeroTeam</span>
    </div>
    <div class="flex gap-2">
      <button onclick="showPage('dashboard')" class="px-4 py-2 rounded-lg bg-indigo-600 text-white"><i class="fas fa-chart-pie mr-2"></i>仪表盘</button>
      <button onclick="showPage('projects')" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600"><i class="fas fa-folder-open mr-2"></i>项目管理</button>
      <button onclick="showPage('agents')" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600"><i class="fas fa-robot mr-2"></i>Agent团队</button>
    </div>
    <div><span class="px-3 py-1 bg-indigo-600 rounded-full text-sm"><i class="fas fa-crown mr-1"></i>CEO: main</span></div>
  </nav>

  <!-- 仪表盘 -->
  <div id="page-dashboard" class="p-6 max-w-7xl mx-auto">
    <h1 class="text-2xl font-bold mb-6"><i class="fas fa-chart-pie text-indigo-400 mr-2"></i>数据概览</h1>
    
    <!-- 4个统计 -->
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="glass rounded-xl p-5 border border-slate-700"><div class="text-3xl font-bold" id="stat-total">-</div><div class="text-slate-400 text-sm"><i class="fas fa-tasks mr-1"></i>总任务</div></div>
      <div class="glass rounded-xl p-5 border border-slate-700"><div class="text-3xl font-bold text-yellow-400" id="stat-pending">-</div><div class="text-slate-400 text-sm"><i class="fas fa-hourglass-half mr-1"></i>待处理</div></div>
      <div class="glass rounded-xl p-5 border border-slate-700"><div class="text-3xl font-bold text-blue-400" id="stat-progress">-</div><div class="text-slate-400 text-sm"><i class="fas fa-spinner mr-1"></i>进行中</div></div>
      <div class="glass rounded-xl p-5 border border-slate-700"><div class="text-3xl font-bold text-green-400" id="stat-completed">-</div><div class="text-slate-400 text-sm"><i class="fas fa-check-circle mr-1"></i>已完成</div></div>
    </div>

    <!-- 3个概览 -->
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="glass rounded-xl p-5 border border-slate-700">
        <h3 class="font-semibold mb-4"><i class="fas fa-folder text-indigo-400 mr-2"></i>项目概览</h3>
        <div class="space-y-3">
          <div class="flex justify-between"><span class="text-slate-400">总项目数</span><span class="font-bold" id="stat-projects">-</span></div>
          <div class="flex justify-between"><span class="text-slate-400">进行中</span><span class="font-bold text-green-400" id="stat-projects-active">-</span></div>
          <div class="flex justify-between"><span class="text-slate-400">已完成</span><span class="font-bold text-purple-400" id="stat-projects-done">-</span></div>
        </div>
      </div>
      <div class="glass rounded-xl p-5 border border-slate-700">
        <h3 class="font-semibold mb-4"><i class="fas fa-list-check text-purple-400 mr-2"></i>需求概览</h3>
        <div class="space-y-3">
          <div class="flex justify-between"><span class="text-slate-400">总需求数</span><span class="font-bold" id="stat-reqs">-</span></div>
          <div class="flex justify-between"><span class="text-slate-400">待处理</span><span class="font-bold text-yellow-400" id="stat-reqs-pending">-</span></div>
          <div class="flex justify-between"><span class="text-slate-400">已完成</span><span class="font-bold text-green-400" id="stat-reqs-done">-</span></div>
        </div>
      </div>
      <div class="glass rounded-xl p-5 border border-slate-700">
        <h3 class="font-semibold mb-4"><i class="fas fa-robot text-cyan-400 mr-2"></i>Agent状态</h3>
        <div class="space-y-3">
          <div class="flex justify-between"><span class="text-slate-400">总Agent数</span><span class="font-bold" id="stat-agents">-</span></div>
          <div class="flex justify-between"><span class="text-slate-400">空闲</span><span class="font-bold text-green-400" id="stat-agents-idle">-</span></div>
          <div class="flex justify-between"><span class="text-slate-400">忙碌</span><span class="font-bold text-yellow-400" id="stat-agents-busy">-</span></div>
        </div>
      </div>
    </div>

    <!-- 2个详情 -->
    <div class="grid grid-cols-2 gap-4">
      <div class="glass rounded-xl p-5 border border-slate-700">
        <h3 class="font-semibold mb-4"><i class="fas fa-chart-bar text-indigo-400 mr-2"></i>项目任务分布</h3>
        <div id="project-task-dist" class="space-y-2">加载中...</div>
      </div>
      <div class="glass rounded-xl p-5 border border-slate-700">
        <h3 class="font-semibold mb-4"><i class="fas fa-clock text-yellow-400 mr-2"></i>最近动态</h3>
        <div id="recent-activity" class="space-y-2 text-sm text-slate-400">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 项目管理 - 卡片视图 -->
  <div id="page-projects" class="p-6 max-w-7xl mx-auto hidden">
    <h1 class="text-2xl font-bold mb-6"><i class="fas fa-folder-open text-indigo-400 mr-2"></i>项目管理</h1>
    <div id="project-cards" class="grid grid-cols-3 gap-4">加载中...</div>
  </div>

  <!-- 项目详情 -->
  <div id="page-project-detail" class="p-6 max-w-7xl mx-auto hidden">
    <!-- 面包屑导航 -->
    <div class="flex items-center gap-2 mb-6 text-sm">
      <button onclick="showPage('projects')" class="text-indigo-400 hover:text-indigo-300"><i class="fas fa-arrow-left mr-1"></i>返回</button>
      <span class="text-slate-500">/</span>
      <span class="text-white font-medium" id="crumb-project">项目</span>
      <span class="text-slate-500">/</span>
      <span class="text-purple-400 font-medium">需求</span>
      <span class="text-slate-500">/</span>
      <span class="text-green-400 font-medium">任务</span>
    </div>
    
    <div class="glass rounded-xl p-6 border border-slate-700 mb-6">
      <div class="flex justify-between items-center">
        <div><h2 class="text-xl font-bold" id="detail-title">-</h2><p class="text-slate-400 text-sm" id="detail-desc">-</p></div>
        <div class="text-right"><div class="text-3xl font-bold text-indigo-400" id="detail-progress">0%</div><div class="text-slate-400 text-sm">完成度</div></div>
      </div>
    </div>
    
    <div class="grid grid-cols-2 gap-4">
      <div class="glass rounded-xl p-6 border border-slate-700">
        <h3 class="font-semibold mb-4"><i class="fas fa-list-check text-purple-400 mr-2"></i>需求列表 <span class="text-slate-500 text-sm" id="req-count"></span></h3>
        <div id="detail-reqs" class="space-y-3">加载中...</div>
      </div>
      <div class="glass rounded-xl p-6 border border-slate-700">
        <h3 class="font-semibold mb-4"><i class="fas fa-tasks text-green-400 mr-2"></i>任务列表 <span class="text-slate-500 text-sm" id="task-count"></span></h3>
        <div id="detail-tasks" class="space-y-2">加载中...</div>
      </div>
    </div>
  </div>

  <!-- Agent管理 -->
  <div id="page-agents" class="p-6 max-w-7xl mx-auto hidden">
    <h1 class="text-2xl font-bold mb-6"><i class="fas fa-robot text-indigo-400 mr-2"></i>Agent团队 <span class="text-slate-500 text-sm" id="agent-total"></span></h1>
    <div class="grid grid-cols-3 gap-4" id="agent-grid">加载中...</div>
  </div>

  <script>
    let currentProjectId = null;
    let allData = { projects: [], todos: [], reqs: [], agents: [] };

    async function loadAll() {
      const [projects, todos, reqs, agents] = await Promise.all([
        fetch('/api/projects').then(r => r.json()),
        fetch('/api/todos').then(r => r.json()),
        fetch('/api/requirements').then(r => r.json()),
        fetch('/api/agents').then(r => r.json())
      ]);
      allData = { projects, todos, reqs, agents };
      return allData;
    }

    function showPage(page) {
      ['dashboard', 'projects', 'project-detail', 'agents'].forEach(p => {
        document.getElementById('page-' + p).classList.add('hidden');
      });
      document.getElementById('page-' + page).classList.remove('hidden');
      
      if (page === 'dashboard') loadDashboard();
      if (page === 'projects') loadProjects();
      if (page === 'agents') loadAgents();
    }

    async function loadDashboard() {
      const data = await loadAll();
      const { projects, todos, reqs, agents } = data;
      
      // 任务统计
      document.getElementById('stat-total').textContent = todos.length;
      document.getElementById('stat-pending').textContent = todos.filter(t => t.status === 'pending').length;
      document.getElementById('stat-progress').textContent = todos.filter(t => t.status === 'in_progress').length;
      document.getElementById('stat-completed').textContent = todos.filter(t => t.status === 'completed').length;
      
      // 项目统计
      document.getElementById('stat-projects').textContent = projects.length;
      document.getElementById('stat-projects-active').textContent = projects.filter(p => p.status === 'active').length;
      document.getElementById('stat-projects-done').textContent = projects.filter(p => p.status === 'completed').length;
      
      // 需求统计
      document.getElementById('stat-reqs').textContent = reqs.length;
      document.getElementById('stat-reqs-pending').textContent = reqs.filter(r => r.status === 'pending').length;
      document.getElementById('stat-reqs-done').textContent = reqs.filter(r => r.status === 'completed').length;
      
      // Agent统计
      document.getElementById('stat-agents').textContent = agents.length;
      document.getElementById('stat-agents-idle').textContent = agents.filter(a => a.status === 'idle').length;
      document.getElementById('stat-agents-busy').textContent = agents.filter(a => a.status === 'busy').length;
      
      // 项目任务分布
      document.getElementById('project-task-dist').innerHTML = projects.map(p => {
        const tasks = todos.filter(t => t.project_id === p.id);
        const done = tasks.filter(t => t.status === 'completed').length;
        const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
        return '<div class="flex items-center gap-3"><span class="w-32 truncate text-slate-400">'+p.name+'</span><div class="flex-1 bg-slate-700 h-4 rounded-full overflow-hidden"><div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full" style="width:'+pct+'%"></div></div><span class="text-sm w-12 text-right">'+pct+'%</span></div>';
      }).join('') || '<div class="text-slate-500">暂无项目</div>';
      
      // 最近动态
      const done = todos.filter(t => t.status === 'completed').slice(-5).reverse();
      document.getElementById('recent-activity').innerHTML = done.length ? done.map(t => 
        '<div class="flex justify-between p-2 bg-slate-800 rounded"><span><i class="fas fa-check-circle text-green-400 mr-2"></i>'+t.title+'</span><span class="text-slate-500">'+t.assignee+'</span></div>'
      ).join('') : '<div class="text-slate-500">暂无动态</div>';
    }

    async function loadAgents() {
      const data = await loadAll();
      const { agents, todos } = data;
      
      const roles = {
        'writer-agent': '内容写作',
        'research-agent': '市场调研',
        'pm-agent': '项目管理',
        'coder-agent': '技术开发',
        'analyst-agent': '数据分析',
        'reviewer-agent': '质量审核'
      };
      
      const statusColors = {
        'idle': 'text-green-400',
        'busy': 'text-yellow-400',
        'offline': 'text-slate-500'
      };
      
      const agentIcons = {
        'writer-agent': 'fa-pen',
        'research-agent': 'fa-search',
        'pm-agent': 'fa-tasks',
        'coder-agent': 'fa-code',
        'analyst-agent': 'fa-chart-line',
        'reviewer-agent': 'fa-clipboard-check'
      };
      
      // 计算每个Agent的任务统计
      const agentStats = {};
      agents.forEach(a => {
        const agentTasks = todos.filter(t => t.assignee === a.name);
        agentStats[a.name] = {
          total: agentTasks.length,
          done: agentTasks.filter(t => t.status === 'completed').length,
          progress: agentTasks.filter(t => t.status === 'in_progress').length
        };
      });
      
      document.getElementById('agent-total').textContent = `(${agents.length}个)`;
      document.getElementById('agent-grid').innerHTML = agents.map(a => {
        const stats = agentStats[a.name] || { total: 0, done: 0, progress: 0 };
        const pct = stats.total ? Math.round(stats.done / stats.total * 100) : 0;
        return '<div class="glass rounded-xl p-5 border border-slate-700 hover:border-indigo-500 transition-all">'+
          '<div class="flex items-center gap-3 mb-3">'+
            '<div class="w-12 h-12 rounded-full bg-indigo-600 flex items-center justify-center">'+
              '<i class="fas '+(agentIcons[a.name]||'fa-robot')+' text-xl"></i>'+
            '</div>'+
            '<div>'+
              '<div class="font-bold text-lg">'+a.name+'</div>'+
              '<div class="text-slate-400 text-sm">'+roles[a.name]+'</div>'+
            '</div>'+
            '<div class="ml-auto '+statusColors[a.status||'idle']+'">'+
              '<i class="fas '+(a.status==='busy'?'fa-spinner fa-spin':a.status==='idle'?'fa-check-circle':'fa-moon')+'"></i> '+
              (a.status==='idle'?'空闲':a.status==='busy'?'工作中':'离线')+
            '</div>'+
          '</div>'+
          '<div class="bg-slate-800 rounded-lg p-3 mb-3">'+
            '<div class="text-xs text-slate-400 mb-2">当前任务</div>'+
            '<div class="text-sm">'+(a.current_task || '等待分配')+'</div>'+
          '</div>'+
          '<div class="grid grid-cols-3 gap-2 text-center">'+
            '<div class="bg-slate-800 rounded p-2"><div class="text-lg font-bold">'+stats.total+'</div><div class="text-xs text-slate-400">总任务</div></div>'+
            '<div class="bg-slate-800 rounded p-2"><div class="text-lg font-bold text-green-400">'+stats.done+'</div><div class="text-xs text-slate-400">已完成</div></div>'+
            '<div class="bg-slate-800 rounded p-2"><div class="text-lg font-bold text-blue-400">'+stats.progress+'</div><div class="text-xs text-slate-400">进行中</div></div>'+
          '</div>'+
          '<div class="mt-3">'+
            '<div class="flex justify-between text-xs text-slate-400 mb-1"><span>完成率</span><span>'+pct+'%</span></div>'+
            '<div class="w-full bg-slate-700 h-2 rounded-full">'+
              '<div class="bg-gradient-to-r from-green-400 to-indigo-500 h-2 rounded-full" style="width:'+pct+'%"></div>'+
            '</div>'+
          '</div>'+
        '</div>';
      }).join('') || '<div class="text-slate-500">暂无Agent</div>';
    }

    async function loadProjects() {
      const data = await loadAll();
      const { projects, todos } = data;
      
      document.getElementById('project-cards').innerHTML = projects.map(p => {
        const tasks = todos.filter(t => t.project_id === p.id);
        const done = tasks.filter(t => t.status === 'completed').length;
        const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
        return '<div onclick="openProject('+p.id+')" class="glass rounded-xl p-5 border border-slate-700 cursor-pointer hover:border-indigo-500 transition-all">'+
          '<div class="flex justify-between items-start mb-3">'+
            '<span class="font-bold text-lg">'+p.name+'</span>'+
            '<span class="text-2xl font-bold text-indigo-400">'+pct+'%</span>'+
          '</div>'+
          '<p class="text-slate-400 text-sm mb-3">'+(p.description||'暂无描述')+'</p>'+
          '<div class="w-full bg-slate-700 rounded-full h-2 mb-3">'+
            '<div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-2 rounded-full" style="width:'+pct+'%"></div>'+
          '</div>'+
          '<div class="flex justify-between text-slate-400 text-sm">'+
            '<span><i class="fas fa-tasks mr-1"></i>'+tasks.length+'个任务</span>'+
            '<span><i class="fas fa-check mr-1"></i>'+done+'完成</span>'+
          '</div>'+
        '</div>';
      }).join('') || '<div class="text-slate-500">暂无项目</div>';
    }

    async function openProject(id) {
      currentProjectId = id;
      const data = await loadAll();
      const { projects, reqs, todos } = data;
      
      const p = projects.find(x => x.id === id);
      if (!p) return;
      
      document.getElementById('crumb-project').textContent = p.name;
      document.getElementById('detail-title').textContent = p.name;
      document.getElementById('detail-desc').textContent = p.description || '';
      
      const tasks = todos.filter(t => t.project_id === id);
      const done = tasks.filter(t => t.status === 'completed').length;
      const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
      document.getElementById('detail-progress').textContent = pct + '%';
      
      // 需求列表
      const preqs = reqs.filter(r => r.project_id === id);
      document.getElementById('req-count').textContent = `(${preqs.length}个)`;
      document.getElementById('detail-reqs').innerHTML = preqs.length ? preqs.map(r => {
        const rt = todos.filter(t => t.requirement_id === r.id);
        const rd = rt.filter(t => t.status === 'completed').length;
        const rpct = rt.length ? Math.round(rd/rt.length*100) : 0;
        return '<div class="p-3 bg-slate-800 rounded-lg">'+
          '<div class="flex justify-between mb-2">'+
            '<span class="text-purple-400 font-medium"><i class="fas fa-list-check mr-2"></i>'+r.title+'</span>'+
            '<span class="text-slate-400">'+rd+'/'+rt.length+'</span>'+
          '</div>'+
          '<div class="w-full bg-slate-700 h-2 rounded-full">'+
            '<div class="bg-purple-500 h-2 rounded-full" style="width:'+rpct+'%"></div>'+
          '</div>'+
        '</div>';
      }).join('') : '<div class="text-slate-500 text-center py-8"><i class="fas fa-inbox mr-2"></i>暂无需求</div>';
      
      // 任务列表
      document.getElementById('task-count').textContent = `(${tasks.length}个)`;
      document.getElementById('detail-tasks').innerHTML = tasks.length ? tasks.map(t => {
        const icon = t.status === 'completed' ? 'fa-check-circle text-green-400' : t.status === 'in_progress' ? 'fa-spinner text-blue-400 fa-spin' : 'fa-hourglass-half text-yellow-400';
        const style = t.status === 'completed' ? 'border-l-2 border-green-500' : t.status === 'in_progress' ? 'border-l-2 border-blue-500' : 'border-l-2 border-yellow-500';
        return '<div class="flex justify-between p-3 bg-slate-800 rounded-lg '+style+'">'+
          '<span><i class="fas '+icon+' mr-2"></i>'+t.title+'</span>'+
          '<span class="text-slate-500 text-sm">'+(t.assignee||'未分配')+'</span>'+
        '</div>';
      }).join('') : '<div class="text-slate-500 text-center py-8"><i class="fas fa-inbox mr-2"></i>暂无任务</div>';
      
      showPage('project-detail');
    }

    loadDashboard();
  </script>
</body>
</html>
