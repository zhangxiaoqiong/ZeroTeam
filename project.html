<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目需求管理</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card-bg: #ffffff;
      --text: #333;
      --text-secondary: #666;
      --border: #e1e4e8;
      --primary: #4a90d9;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { margin-bottom: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
    .card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); }
    .card h2 { font-size: 1rem; margin-bottom: 16px; }
    display: flex; .project-list { flex-direction: column; gap: 10px; }
    .project-item { padding: 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .project-item:hover { border-color: var(--primary); }
    .project-item.active { border-color: var(--primary); background: #f0f7ff; }
    .project-name { font-weight: 600; }
    .project-meta { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }
    .task-table { width: 100%; border-collapse: collapse; }
    .task-table th, .task-table td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .task-table th { background: #f8f9fa; font-weight: 600; }
    .status { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; }
    .status.pending { background: #fff3cd; color: #856404; }
    .status.in_progress { background: #cce5ff; color: #004085; }
    .status.completed { background: #d4edda; color: #155724; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 4px; font-size: 0.85rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: var(--card-bg); padding: 24px; border-radius: 12px; width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .modal-header h2 { margin: 0; }
    .close { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
    .empty { text-align: center; padding: 40px; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 项目需求管理系统</h1>
      <div>
        <button class="btn" onclick="showProjectModal()">+ 新建项目</button>
        <button class="btn" onclick="showTaskModal()">+ 新建任务</button>
      </div>
    </div>
    
    <div class="grid">
      <!-- 项目列表 -->
      <div class="card">
        <h2>📁 项目列表</h2>
        <div class="project-list" id="projectList">
          <div class="empty">暂无项目</div>
        </div>
      </div>
      
      <!-- 任务列表 -->
      <div class="card">
        <h2>📋 任务列表 <span id="projectTitle"></span></h2>
        <table class="task-table">
          <thead>
            <tr>
              <th>任务</th>
              <th>负责Agent</th>
              <th>状态</th>
              <th>计划开始</th>
              <th>计划结束</th>
              <th>实际开始</th>
              <th>实际结束</th>
            </tr>
          </thead>
          <tbody id="taskList">
            <tr><td colspan="7" class="empty">请选择项目</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 新建项目弹窗 -->
  <div class="modal" id="projectModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>新建项目</h2>
        <button class="close" onclick="closeProjectModal()">&times;</button>
      </div>
      <form onsubmit="createProject(event)">
        <div class="form-group">
          <label>项目名称</label>
          <input type="text" id="projectName" required>
        </div>
        <div class="form-group">
          <label>描述</label>
          <textarea id="projectDesc" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>优先级</label>
          <select id="projectPriority">
            <option value="low">低</option>
            <option value="medium" selected>中</option>
            <option value="high">高</option>
          </select>
        </div>
        <button type="submit" class="btn">创建</button>
      </form>
    </div>
  </div>

  <!-- 新建任务弹窗 -->
  <div class="modal" id="taskModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>新建任务</h2>
        <button class="close" onclick="closeTaskModal()">&times;</button>
      </div>
      <form onsubmit="createTask(event)">
        <div class="form-group">
          <label>任务名称</label>
          <input type="text" id="taskTitle" required>
        </div>
        <div class="form-group">
          <label>负责Agent</label>
          <select id="taskAgent">
            <option value="">未分配</option>
            <option value="writer-agent">writer-agent</option>
            <option value="research-agent">research-agent</option>
            <option value="pm-agent">pm-agent</option>
            <option value="coder-agent">coder-agent</option>
            <option value="analyst-agent">analyst-agent</option>
            <option value="reviewer-agent">reviewer-agent</option>
          </select>
        </div>
        <div class="form-group">
          <label>状态</label>
          <select id="taskStatus">
            <option value="pending" selected>待处理</option>
            <option value="in_progress">进行中</option>
            <option value="completed">已完成</option>
          </select>
        </div>
        <div class="form-group">
          <label>计划开始时间</label>
          <input type="date" id="taskPlannedStart">
        </div>
        <div class="form-group">
          <label>计划结束时间</label>
          <input type="date" id="taskPlannedEnd">
        </div>
        <div class="form-group">
          <label>实际开始时间</label>
          <input type="date" id="taskActualStart">
        </div>
        <div class="form-group">
          <label>实际结束时间</label>
          <input type="date" id="taskActualEnd">
        </div>
        <button type="submit" class="btn">创建</button>
      </form>
    </div>
  </div>

  <script>
    let currentProjectId = null;
    let projects = [];
    let tasks = [];

    // 加载项目
    async function loadProjects() {
      const res = await fetch('/api/projects');
      projects = await res.json();
      renderProjects();
    }

    // 渲染项目列表
    function renderProjects() {
      const list = document.getElementById('projectList');
      if (projects.length === 0) {
        list.innerHTML = '<div class="empty">暂无项目</div>';
        return;
      }
      list.innerHTML = projects.map(p => `
        <div class="project-item ${currentProjectId === p.id ? 'active' : ''}" onclick="selectProject(${p.id})">
          <div class="project-name">${p.name}</div>
          <div class="project-meta">${p.status} | ${p.priority}</div>
        </div>
      `).join('');
    }

    // 选择项目
    async function selectProject(id) {
      currentProjectId = id;
      renderProjects();
      const project = projects.find(p => p.id === id);
      document.getElementById('projectTitle').textContent = `- ${project.name}`;
      await loadTasks(id);
    }

    // 加载任务
    async function loadTasks(projectId) {
      const res = await fetch('/api/todos?project_id=' + projectId);
      tasks = await res.json();
      renderTasks();
    }

    // 渲染任务列表
    function renderTasks() {
      const tbody = document.getElementById('taskList');
      if (tasks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">暂无任务</td></tr>';
        return;
      }
      tbody.innerHTML = tasks.map(t => `
        <tr>
          <td>${t.title}</td>
          <td>${t.assignee || '-'}</td>
          <td><span class="status ${t.status}">${t.status === 'pending' ? '待处理' : t.status === 'in_progress' ? '进行中' : '已完成'}</span></td>
          <td>${t.planned_start || '-'}</td>
          <td>${t.planned_end || '-'}</td>
          <td>${t.actual_start || '-'}</td>
          <td>${t.actual_end || '-'}</td>
        </tr>
      `).join('');
    }

    // 新建项目
    function showProjectModal() {
      document.getElementById('projectModal').classList.add('show');
    }
    function closeProjectModal() {
      document.getElementById('projectModal').classList.remove('show');
    }
    async function createProject(e) {
      e.preventDefault();
      const name = document.getElementById('projectName').value;
      const description = document.getElementById('projectDesc').value;
      const priority = document.getElementById('projectPriority').value;
      
      await fetch('/api/projects', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name, description, priority })
      });
      
      closeProjectModal();
      loadProjects();
    }

    // 新建任务
    function showTaskModal() {
      if (!currentProjectId) { alert('请先选择项目'); return; }
      document.getElementById('taskModal').classList.add('show');
    }
    function closeTaskModal() {
      document.getElementById('taskModal').classList.remove('show');
    }
    async function createTask(e) {
      e.preventDefault();
      const title = document.getElementById('taskTitle').value;
      const assignee = document.getElementById('taskAgent').value;
      const status = document.getElementById('taskStatus').value;
      const planned_start = document.getElementById('taskPlannedStart').value;
      const planned_end = document.getElementById('taskPlannedEnd').value;
      const actual_start = document.getElementById('taskActualStart').value;
      const actual_end = document.getElementById('taskActualEnd').value;
      
      await fetch('/api/todos', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          title,
          assignee,
          status,
          project_id: currentProjectId,
          planned_start,
          planned_end,
          actual_start,
          actual_end
        })
      });
      
      closeTaskModal();
      loadTasks(currentProjectId);
    }

    // 初始化
    loadProjects();
  </script>
</body>
</html>
